# Render.com blueprint — deploy with one click via "New + > Blueprint".
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: for-our-relationship
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 1 --timeout 60 --bind 0.0.0.0:$PORT
    envVars:
      # A secret guarding /cron/morning. Render generates a random value.
      - key: CRON_SECRET
        generateValue: true
      # VAPID keys — leave unset to use the in-code dev keys, OR paste your
      # own (recommended) in the Render dashboard. Generate: python generate_vapid.py
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_SUBJECT
        value: mailto:hello@forourrelationship.app
      # Persistent storage (REQUIRED on free tier — the disk is ephemeral).
      # Create a free database at https://upstash.com (Redis) and paste the
      # REST URL + token here. Without these, data resets when the app sleeps.
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false

# ── Morning notifications ────────────────────────────────────────
# Render free web services sleep after inactivity, so the in-process
# scheduler is unreliable. Create a free external cron at
# https://cron-job.org that GETs (once each morning, e.g. 08:00):
#     https://<your-app>.onrender.com/cron/morning?key=<CRON_SECRET>
# That wakes the app and sends the push to both partners.
